<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Pixel Blackjack{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='fonts/fonts.css') }}" onerror="this.remove()">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<meta name="theme-color" content="#07100a">
</head>
<body>
<div class="scanlines"></div>
<nav class="navbar">
  <a href="{{ url_for('game') }}" class="nav-brand pixel">🃏 PIXEL BJ</a>
  <div class="nav-links">
    <a href="{{ url_for('game') }}"                                      class="nav-link {% if request.endpoint=='game' %}active{% endif %}">HRÁT</a>
    <a href="{{ url_for('leaderboard') }}"                               class="nav-link {% if request.endpoint=='leaderboard' %}active{% endif %}">ŽEBŘÍČEK</a>
    <a href="{{ url_for('docs') }}"                                      class="nav-link {% if request.endpoint in ['docs','docs_download','docs_view'] %}active{% endif %}">📁 DOCS</a>
    <a href="{{ url_for('profile', username=session.get('uname','')) }}" class="nav-link {% if request.endpoint=='profile' %}active{% endif %}">PROFIL</a>
    {% if session.get('is_admin') %}
    <a href="{{ url_for('admin') }}" class="nav-link nav-admin {% if request.endpoint=='admin' %}active{% endif %}">👑 ADMIN</a>
    {% endif %}
    <a href="{{ url_for('logout') }}" class="nav-link nav-logout">ODHLÁSIT</a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>
{% block js %}{% endblock %}
</body>
</html>
