<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>Přihlášení - Pong</title>
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: "Consolas", monospace;
        text-align: center;
        padding-top: 50px;
      }
      form {
        display: inline-block;
        border: 2px solid #fff;
        padding: 20px;
        border-radius: 10px;
      }
      input {
        display: block;
        margin: 10px 0;
        padding: 10px;
        width: 250px;
      }
      button {
        background: #555;
        color: white;
        border: 1px solid #fff;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:hover {
        background: #fff;
        color: #000;
      }
      a {
        color: #aaa;
        text-decoration: none;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <h1>PŘIHLÁŠENÍ DO HRY</h1>
    {% with messages = get_flashed_messages() %} {% if messages %} {% for
    message in messages %}
    <p style="color: red">{{ message }}</p>
    {% endfor %} {% endif %} {% endwith %}
    <form method="POST">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Heslo" required />
      <button type="submit">Vstoupit</button>
    </form>
    <p><a href="{{ url_for('register') }}">Nemáš účet? Zaregistruj se.</a></p>
  </body>
</html>
