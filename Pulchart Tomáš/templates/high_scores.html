<!DOCTYPE html>
<html>
<head>
    <title>Pcherské Legendy - Skóre</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="top-bar">
        <div class="nav-container">
            <a href="/" class="nav-link">Přihlášení</a>
            <a href="/register" class="nav-link">Registrace</a>
            <a href="/characters" class="nav-link">Postavy</a>
            <a href="/highscores" class="nav-link active">Žebříček</a>
            <a href="/manual" class="nav-link">Manuál</a>
            <a href="/diagramy" class="nav-link">Diagramy</a>
        </div>
    </nav>
    <div class="container">
    <h2>Skóre</h2>
    <table id="highscoresTable" class="table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Character</th>
                <th>Player</th>
                <th>Level</th>
                <th>Gold</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody id="highscoresBody"></tbody>
    </table>
    
    <div class="links">
        <a href="/login">Přihlásit Se</a> | 
        <a href="/register">Vytvořit Účet</a>
    </div>

    </div>

    <script>
        async function loadHighscores() {
            const response = await fetch('/api/highscores');
            const data = await response.json();
            
            const highscoresBody = document.getElementById('highscoresBody');
            highscoresBody.innerHTML = '';
            
            data.highscores.forEach((score, index) => {
                const row = document.createElement('tr');
                if (index < 3) row.className = `rank-${index + 1}`;
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${score.character_name}</td>
                    <td>${score.username}</td>
                    <td>${score.level}</td>
                    <td>${score.gold}</td>
                    <td>${score.score}</td>
                `;
                highscoresBody.appendChild(row);
            });
        }
        
        loadHighscores();
    </script>
</body>
</html>
