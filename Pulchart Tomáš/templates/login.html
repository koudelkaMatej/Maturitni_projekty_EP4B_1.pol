<!DOCTYPE html>
<html>
<head>
    <title>Pcherské Legendy - Přihlášení</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="top-bar">
        <div class="nav-container">
            <a href="/" class="nav-link active">Přihlášení</a>
            <a href="/register" class="nav-link">Registrace</a>
            <a href="/characters" class="nav-link">Postavy</a>
            <a href="/highscores" class="nav-link">Žebříček</a>
            <a href="/manual" class="nav-link">Manuál</a>
            <a href="/diagramy" class="nav-link">Diagramy</a>
        </div>
    </nav>
    <div class="container">
        <h2>Pcherské Legendy - Přihlášení</h2>
        <div class="input-row">
            <label>Uživatelské Jméno:</label>
            <input type="text" id="username">
        </div>
        <div class="input-row">
            <label>Heslo:</label>
            <input type="password" id="password">
        </div>
        <button class="button-primary" style="width:100%" onclick="login()">Přihlásit se</button>
        <div class="links">
            <a href="/register">Vytvořit účet</a> | 
            <a href="/highscores">Zobrazit skóre</a>
        </div>
        <div id="error" class="error" style="color:#ef4444; margin-top:10px;"></div>
    </div>

    <script>
        async function login() {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('username', data.username);
                window.location.href = '/characters';
            } else {
                document.getElementById('error').textContent = data.message;
            }
        }
    </script>
</body>
</html>
