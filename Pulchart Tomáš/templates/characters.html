<!DOCTYPE html>
<html>
<head>
    <title>Pcherské Legendy - Postavy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal .box { background: #1b2138; color: #fff; padding: 20px; border-radius: 8px; width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
        .modal button { padding: 8px 12px; }
    </style>
</head>
<body>
    <nav class="top-bar">
        <div class="nav-container">
            <a href="/" class="nav-link">Přihlášení</a>
            <a href="/register" class="nav-link">Registrace</a>
            <a href="/characters" class="nav-link active">Postavy</a>
            <a href="/highscores" class="nav-link">Žebříček</a>
            <a href="/manual" class="nav-link">Manuál</a>
            <a href="/diagramy" class="nav-link">Diagramy</a>
        </div>
    </nav>
    <div class="container">
        <h2>Postavy</h2>
        <div id="charactersList"></div>
        
        <div class="new-character" style="margin:20px 0;">
            <h3>Vytvořit Novou Postavu</h3>
            <div class="input-row">
                <input type="text" id="characterName" placeholder="Jméno Postavy">
            </div>
            <button class="button-primary" onclick="createCharacter()">Vytvořit Postavu</button>
        </div>
        
        <div class="links" style="margin-top: 20px;">
            <a href="/highscores">Zobrazit Skóre</a> | 
            <a href="/login" onclick="logout()">Odhlásit Se</a>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('user_id');
        const username = localStorage.getItem('username');
        
        if (!userId) {
            window.location.href = '/login';
        }
        
        document.title = `RPG Game - ${username}'s Characters`;
        
        async function loadCharacters() {
            const response = await fetch(`/api/characters?user_id=${userId}`);
            const data = await response.json();
            
            const charactersList = document.getElementById('charactersList');
            charactersList.innerHTML = '';
            
            if (data.characters.length === 0) {
                charactersList.innerHTML = '<p>No characters yet. Create your first character!</p>';
                return;
            }
            
            data.characters.forEach(character => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${character.name}</h3>
                    <div class="stats">
                        Level: ${character.level} | Gold: ${character.gold} | 
                        Attack: ${character.attack} | Defense: ${character.defense}
                    </div>
                    <div class="actions">
                        <button class="button-primary" onclick="playGame(${character.id})">Hrát</button>
                        <button onclick="confirmDelete(${character.id})">Smazat</button>
                    </div>
                `;
                charactersList.appendChild(card);
            });
        }
        
        async function createCharacter() {
            const name = document.getElementById('characterName').value.trim();
            if (!name) return alert('Please enter a character name');
            
            const response = await fetch('/api/characters', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name,
                    user_id: parseInt(userId)
                })
            });
            
            const data = await response.json();
            if (data.success) {
                document.getElementById('characterName').value = '';
                loadCharacters();
            }
        }
        
        function playGame(characterId) {
            localStorage.setItem('current_character_id', characterId);
            alert('Launch the PyQt6 game client to play with this character!');
        }

        function logout() {
            localStorage.clear();
        }

        let pendingDeleteId = null;
        function confirmDelete(characterId) {
            pendingDeleteId = characterId;
            document.getElementById('confirmDeleteModal').style.display = 'flex';
        }

        function closeConfirm() {
            pendingDeleteId = null;
            document.getElementById('confirmDeleteModal').style.display = 'none';
        }

        async function performDelete() {
            const characterId = pendingDeleteId;
            if (!characterId) { closeConfirm(); return; }
            try {
                const response = await fetch(`/api/characters/${characterId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: parseInt(userId) })
                });
                const data = await response.json();
                if (data.success) {
                    closeConfirm();
                    loadCharacters();
                } else {
                    closeConfirm();
                    alert(data.error || 'Smazání se nezdařilo.');
                }
            } catch (e) {
                closeConfirm();
                alert('Chyba při mazání postavy.');
            }
        }
        
        loadCharacters();
    </script>
    <div id="confirmDeleteModal" class="modal">
        <div class="box">
            <div>Opravdu smazat tuto postavu?</div>
            <div class="actions">
                <button class="button-primary" onclick="performDelete()">Ano</button>
                <button onclick="closeConfirm()">Ne</button>
            </div>
        </div>
    </div>
</body>
</html>
